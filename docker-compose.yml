services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8000:8000"
      - "5173:5173"
    command: >
      bash -c "composer install
      && npm install
      && php artisan key:generate
      && php artisan migrate --seed
      && npm run build
      && php artisan serve --host=0.0.0.0 --port=8000"

  # ── MySQL (optional) ───────────────────────────────────────
  # Uncomment the service below if you're using MySQL instead of SQLite.
  # Also update your .env: DB_CONNECTION=mysql, DB_HOST=db, DB_PORT=3306
  #
  # db:
  #   image: mysql:8.0
  #   container_name: app-db
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_DATABASE: ${DB_DATABASE:-database}
  #     MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
  #     MYSQL_USER: ${DB_USERNAME:-user}
  #     MYSQL_PASSWORD: ${DB_PASSWORD:-password}
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - database:/var/lib/mysql

# volumes:
#   database: # Used by MySQL service above; can be removed if not using MySQL
